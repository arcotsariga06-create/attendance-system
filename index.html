<!DOCTYPE html>
<html>
<head>
<title>Attendance Management System</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

.container{
background:white;
padding:30px;
margin:50px auto;
width:400px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
padding:8px;
margin:8px;
width:80%;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
border-radius:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Student Attendance</h2>

<input type="text" id="name" placeholder="Student Name">

<br>

<button onclick="markPresent()">Present</button>
<button onclick="markAbsent()">Absent</button>

<h3 id="result"></h3>

</div>

<script>

function markPresent(){
document.getElementById("result").innerHTML="Marked Present";
}

function markAbsent(){
document.getElementById("result").innerHTML="Marked Absent";
}

</script>

</body>
</html>
